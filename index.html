<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Primary Favicon (SVG — scales infinitely, best for modern browsers) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ✅ Fallback ICO (IE, older browsers) -->
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />

    <!-- ✅ PNG favicon 96x96 (standard PNG fallback) -->
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />

    <!-- ✅ Apple Touch Icon (iOS home screen, Safari bookmarks) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ✅ Web App Manifest (PWA support, Android home screen icons) -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ✅ Browser theme color (matches site navy primary) -->
    <meta name="theme-color" content="#0c2340" />
    <meta name="msapplication-TileColor" content="#0c2340" />

    <!-- ✅ SEO Meta Tags -->
    <title>Unity Education Foundation | Operational Support & Data Management Services</title>
    <meta name="description" content="Unity Education Foundation provides professional operational support, data management, monitoring & evaluation, documentation, and communication services. Established 2017, Meerut (UP)." />
    <meta name="keywords" content="Unity Education Foundation, operational support, data management, monitoring services, documentation, Meerut, UP" />
    <meta name="author" content="Unity Education Foundation" />

    <!-- ✅ Open Graph (Social sharing preview) -->
    <meta property="og:title" content="Unity Education Foundation" />
    <meta property="og:description" content="Empowering Organizations Through Efficient Operations & Professional Support Services." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/web-app-manifest-512x512.png" />

    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Unity Education Foundation" />
    <meta name="twitter:description" content="Empowering Organizations Through Efficient Operations & Professional Support Services." />
    <meta name="twitter:image" content="/web-app-manifest-512x512.png" />
  </head>

  </body>
</html>
